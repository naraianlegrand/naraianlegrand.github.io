    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800;900&display=swap" rel="stylesheet">

<body>
    <canvas id="bg-canvas"></canvas>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <a href="index.html">Karthikeyan Umesh</a>
            </div>
            <div class="nav-menu" id="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="#skills-container" class="nav-link">Skills</a>

                <span class="bar"></span>
                <span class="bar"></span>

        <button id="close-hint-btn">✕</button>

        <main>
            <section id="summary-container"></section>

            <section id="experience-container"></section>

        </footer>
    </div>

    <!-- Sci-Fi HUD Scroll Button -->
    <button id="sci-fi-scroll" aria-label="Scroll to top">
        <div class="scanline"></div>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"></line>
            <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
